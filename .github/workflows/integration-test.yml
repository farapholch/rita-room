name: Integration Test

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Debug - List dist folder
        run: |
          echo "=== Checking dist folder ==="
          ls -la dist/ || echo "dist folder not found"
          echo "=== Checking src folder ==="
          ls -la src/

      - name: Install test dependencies
        run: yarn add -D socket.io-client

      - name: Start server in background
        run: |
          # Find index.js (could be in dist/ or dist/src/ depending on tsconfig)
          if [ -f dist/index.js ]; then
            ENTRY="dist/index.js"
          elif [ -f dist/src/index.js ]; then
            ENTRY="dist/src/index.js"
          else
            echo "Cannot find compiled index.js"
            find dist -name "index.js" || true
            exit 1
          fi
          echo "Starting server from: $ENTRY"
          PORT=3002 DRAGONFLY_MASTER_HOST=localhost DRAGONFLY_PORT=6379 CORS_ORIGIN="*" NODE_ENV=test node "$ENTRY" &
          echo $! > /tmp/server.pid
          sleep 3

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if nc -z localhost 3002 2>/dev/null; then
              echo "Server is listening on port 3002"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "Server failed to start"
          # Show any error output
          cat /tmp/server.log 2>/dev/null || true
          exit 1

      - name: Run integration tests
        run: node tests/integration-test.mjs
        env:
          SERVER_URL: http://localhost:3002

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi
