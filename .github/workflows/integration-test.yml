name: Integration Test

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Start server with coverage
        run: |
          PORT=3002 DRAGONFLY_MASTER_HOST=localhost DRAGONFLY_PORT=6379 CORS_ORIGIN="*" NODE_ENV=test \
            npx c8 --reporter=text --reporter=lcov --report-dir=coverage node dist/index.js &
          echo $! > /tmp/server.pid
          sleep 3

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3002/health > /dev/null 2>&1; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run integration tests
        run: yarn test:integration
        env:
          SERVER_URL: http://localhost:3002

      - name: Stop server and generate coverage
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill -SIGINT $(cat /tmp/server.pid) 2>/dev/null || true
            sleep 2
          fi

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
